<div class="perfil-edit">
  <ion-item>
    <ion-label position="stacked">Nick de jugador</ion-label>
    <ion-input
      [value]="nick()"
      (ionInput)="nick.set($any($event.target).value ?? '')"
      placeholder="@tu_nick"
    ></ion-input>
  </ion-item>

  <h3>Experiencia</h3>
  <ion-segment [value]="experienceLevel() ?? ''" scrollable="true" class="perfil-edit__segment">
    <ion-segment-button value="beginner" (click)="setExperience('beginner')">
      <ion-label>Principiante</ion-label>
    </ion-segment-button>
    <ion-segment-button value="casual" (click)="setExperience('casual')">
      <ion-label>Casual</ion-label>
    </ion-segment-button>
    <ion-segment-button value="competitive" (click)="setExperience('competitive')">
      <ion-label>Competitivo</ion-label>
    </ion-segment-button>
  </ion-segment>

  <app-onboarding-paso-juegos
    [wargames]="wargames()"
    [selectedIds]="favoriteGamesIds()"
    (selectedIdsChange)="favoriteGamesIds.set($event)">
  </app-onboarding-paso-juegos>

  <app-onboarding-paso-ubicacion
    [location]="location()"
    [locationLoading]="locationLoading()"
    (usarUbicacion)="usarUbicacionActual()">
  </app-onboarding-paso-ubicacion>

  @if (errorMessage()) {
    <p class="perfil-edit__error">{{ errorMessage() }}</p>
  }

  <div class="perfil-edit__actions">
    <ion-button fill="outline" (click)="cancel()">Cancelar</ion-button>
    <ion-button color="primary" (click)="save()" [disabled]="saving()">
      @if (saving()) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        Guardar
      }
    </ion-button>
  </div>
</div>
